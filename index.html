<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>A Special Date for My Wife ❤️</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#ff7eb3,#ff758c,#ffd3e1);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
overflow:hidden;
}
.card{
background:#fff;
width:90%;
max-width:500px;
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
position:relative;
z-index:2;
}
h1{text-align:center;color:#e91e63;}
p{text-align:center;color:#555;}
label{display:block;margin-top:15px;font-weight:bold;}
input,select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:10px;
border:1px solid #ccc;
}
button{
width:100%;
padding:12px;
margin-top:20px;
background:#e91e63;
color:#fff;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}
button:hover{background:#d81b60;}
#result{
display:none;
margin-top:20px;
padding:15px;
background:#ffe6ef;
border-radius:10px;
}
.heart{
position:fixed;
color:#fff;
font-size:20px;
animation:fall linear infinite;
top:-20px;
}
@keyframes fall{
to{
transform:translateY(110vh);
}
}
</style>
</head>

<body>

<div class="card">

<h1>❤️ A Special Date Invitation ❤️</h1>

<p>
To my amazing wife,<br><br>
Life is better with you. ❤️<br>
Will you let your husband <b>Abdou</b> take you on a special date?
</p>

<label>Date</label>
<input type="date" id="date">

<label>Time</label>
<input type="time" id="time">

<label>What shall we eat?</label>
<select id="food">
<option>🍕 Pizza</option>
<option>🍔 Burgers</option>
<option>🍝 Pasta</option>
<option>🍣 Sushi</option>
<option>🥩 Steak</option>
<option>🍰 Dessert Only 😋</option>
</select>

<label>Activity</label>
<select id="activity">
<option>🎬 Movie Night</option>
<option>☕ Coffee Date</option>
<option>🌙 Romantic Walk</option>
<option>🛍️ Shopping Together</option>
<option>🍦 Ice Cream</option>
<option>🏡 Cozy Night at Home</option>
</select>

<button onclick="submitForm()">💖 Accept Date</button>

<div id="result"></div>

</div>

<script>

for(let i=0;i<35;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(3+Math.random()*5)+"s";
h.style.fontSize=(15+Math.random()*20)+"px";
document.body.appendChild(h);
}

function confetti(){
for(let i=0;i<80;i++){
let c=document.createElement("div");
c.innerHTML="🎉";
c.style.position="fixed";
c.style.left=Math.random()*100+"vw";
c.style.top="-20px";
c.style.fontSize="20px";
c.style.transition="4s linear";
document.body.appendChild(c);

setTimeout(()=>{
c.style.top="100vh";
},50);

setTimeout(()=>{
c.remove();
},4000);
}
}

function submitForm(){

confetti();

let d=document.getElementById("date").value;
let t=document.getElementById("time").value;
let f=document.getElementById("food").value;
let a=document.getElementById("activity").value;

document.getElementById("result").style.display="block";

document.getElementById("result").innerHTML=
`
<h2>❤️ Date Approved ❤️</h2>

<p>
Thank you, my beautiful wife! 🥰
</p>

<p>
📅 <b>${d}</b><br>
⏰ <b>${t}</b><br>
🍽️ <b>${f}</b><br>
🎉 <b>${a}</b>
</p>

<p>
Love always,<br>
<b>❤️ Abdou ❤️</b>
</p>
`;

}
</script>

</body>
</html>
