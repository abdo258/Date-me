<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>For My Wife ❤️</title>
<style>
body{margin:0;font-family:Arial;background:linear-gradient(135deg,#ff7eb3,#ffc2d1);overflow:hidden}
.card{max-width:520px;margin:40px auto;background:#ffffffdd;padding:24px;border-radius:20px;box-shadow:0 10px 30px #0003;position:relative;z-index:2}
h1{text-align:center;color:#e91e63}label{display:block;margin-top:10px}input,select{width:100%;padding:10px;border-radius:8px}
.btns{position:relative;height:70px;margin-top:18px}.yes,.no{padding:12px 18px;border:none;border-radius:10px;color:#fff;cursor:pointer}
.yes{background:#e91e63}.no{background:#666;position:absolute;right:0}
#out{display:none;background:#ffe8f0;padding:15px;border-radius:10px;margin-top:15px}
.heart{position:fixed;top:-20px;color:#fff;animation:f 8s linear infinite}
@keyframes f{to{transform:translateY(110vh)}}
</style></head><body>
<div class="card">
<h1>❤️ A Surprise for My Beautiful Wife ❤️</h1>
<p>My love,<br>I choose you every day. Will you let your husband <b>Abdou</b> take you on a special date? 🥰</p>
<label>Date</label><input id="d" type="date">
<label>Time</label><input id="t" type="time">
<label>Food</label><select id="f"><option>🍕 Pizza</option><option>🍔 Burgers</option><option>🍣 Sushi</option><option>🍝 Pasta</option><option>🍰 Dessert</option></select>
<label>Activity</label><select id="a"><option>🎬 Movie</option><option>☕ Coffee</option><option>🌙 Walk</option><option>🛍️ Shopping</option><option>🍦 Ice Cream</option></select>
<div class="btns">
<button class="yes" onclick="ok()">❤️ Yes, Abdou!</button>
<button class="no" id="n">🙈 No</button>
</div>
<div id="out"></div>
</div>
<script>
for(let i=0;i<40;i++){let h=document.createElement('div');h.className='heart';h.innerHTML='❤';h.style.left=Math.random()*100+'vw';h.style.fontSize=(15+Math.random()*18)+'px';h.style.animationDuration=(4+Math.random()*5)+'s';document.body.appendChild(h);}
const msgs=["Nice try 😂","You can't say no to Abdou ❤️","Catch me! 😜","Wrong button 🤣","Press YES 💖"];
const n=document.getElementById('n');
function move(){n.style.left=Math.random()*(window.innerWidth-120)+'px';n.style.top=Math.random()*(window.innerHeight-80)+'px';n.innerHTML=msgs[Math.floor(Math.random()*msgs.length)];}
n.onmouseover=move;n.onclick=move;
function ok(){
for(let i=0;i<80;i++){let e=document.createElement('div');e.innerHTML='🎉';e.style.position='fixed';e.style.left=Math.random()*100+'vw';e.style.top='-20px';e.style.transition='3s';document.body.appendChild(e);setTimeout(()=>e.style.top='100vh',10);setTimeout(()=>e.remove(),3100);}
out.style.display='block';
out.innerHTML=`<h2>❤️ It's a Date! ❤️</h2>
<p><b>Date:</b> ${d.value}<br><b>Time:</b> ${t.value}<br><b>Food:</b> ${f.value}<br><b>Activity:</b> ${a.value}</p>
<p>Love you always,<br><b>❤️ Abdou ❤️</b></p>`;
}
</script></body></html>
